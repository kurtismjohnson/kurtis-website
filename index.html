<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kurtis' website</title>
    <style>
        body {
            background-image: url(stars2.gif);
            text-align: center;
            margin: 50px;
        }
        a { 
            color: #f3a3fd;
        }
        h1 {
            color:#9eff00;
        }
        h4 {
            color:#9eff00;
        }
        p {
            color:#9eff00;
        }
        img {
            max-width: 50%;
            height: auto;
            margin: 20px 0;
        }
            
        .links a {
            display: inline-block;
            margin: 5px 0;
            text-decoration: none;
        }

        /* ── DVD bounce ── */
        #bounce-arena {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 999;
        }
        .dvd-bounce {
            position: absolute;
            user-select: none;
        }
        .dvd-bounce img {
            width: 800px;
            height: auto;
            display: block;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="bounce-arena">
        <div class="dvd-bounce" id="bouncer">
            <img src="painting.gif" alt="a picture of kurtis">
        </div>
    </div>

    <h1>welcome to kurtis' kool website!</h1>
    <h4>my name is kurtis, and i am a photographer. here is a photo of me.</h4>
    <h4><a href="https://kurtismjohnson.com" target="_blank">here is a link</a> to my other site where i share photo work and write about it.</h4>
    <div class="links">
        <a href="https://bsky.app/profile/kurtismjohnson.me" target="_blank">
            <img src="bsky4.png" width="70" height="70">
        </a>
        <a href="https://instagram.com/kurtismjohnson" target="_blank">
            <img src="insta4.png" width="70" height="70">
        </a>
        <p>
            <img src="webgif2.gif" alt="dial up computer">
            <h4>you are connected to the world wide web!</h4>
        </p>
    </div>

    <footer>
        <small>
            <p>© kurtis m johnson llc 2025</p>
        </small>
    </footer>

    <script>
        const el = document.getElementById('bouncer');
        let x = 60, y = 60;
        let dx = 2, dy = 2;

        function tick() {
            const maxX = window.innerWidth  - el.offsetWidth;
            const maxY = window.innerHeight - el.offsetHeight;

            x += dx;
            y += dy;

            if (x <= 0)    { x = 0;    dx =  Math.abs(dx); }
            if (x >= maxX) { x = maxX; dx = -Math.abs(dx); }
            if (y <= 0)    { y = 0;    dy =  Math.abs(dy); }
            if (y >= maxY) { y = maxY; dy = -Math.abs(dy); }

            el.style.left = x + 'px';
            el.style.top  = y + 'px';

            requestAnimationFrame(tick);
        }

        tick();
    </script>

</body>
</html>
